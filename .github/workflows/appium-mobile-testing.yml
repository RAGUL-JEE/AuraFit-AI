name: Appium Mobile Testing

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]
  workflow_dispatch:

jobs:
  mobile-tests:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Enable KVM group perms
      run: |
        echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' | sudo tee /etc/udev/rules.d/99-kvm4all.rules
        sudo udevadm control --reload-rules
        sudo udevadm trigger --name-match=kvm

    - name: Setup Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'
        cache: 'pip'

    - name: Install Python Dependencies
      run: |
        cd appium_framework
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Setup Java
      uses: actions/setup-java@v4
      with:
        distribution: 'temurin'
        java-version: '17'

    - name: Setup Node.js & Appium
      uses: actions/setup-node@v4
      with:
        node-version: '20'
    - run: |
        npm install -g appium
        appium driver install uiautomator2

    - name: Start Appium Server
      run: appium --base-path /wd/hub &
      
    - name: Install Expo CLI (For Expo Go testing)
      run: npm install -g expo-cli

    - name: Run Android Emulator and Execute Tests
      uses: reactivecircus/android-emulator-runner@v2
      with:
        api-level: 29
        target: default
        arch: x86_64
        profile: Nexus 6
        emulator-options: -no-window -gpu swiftshader_indirect -noaudio -no-boot-anim -camera-back none
        disable-animations: true
        script: |
          cd appium_framework
          python test_case_generator.py
          pytest tests/ --alluredir=reports/allure-results

    - name: Generate Allure Report
      uses: simple-elf/allure-report-action@master
      if: always()
      with:
        allure_results: appium_framework/reports/allure-results
        allure_report: appium_framework/reports/allure-report
        allure_history: allure-history

    - name: Upload Artifacts
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: mobile-automation-reports
        path: |
          appium_framework/Mobile_TestCases.xlsx
          appium_framework/reports/Mobile_TestExecutionReport.xlsx
          appium_framework/reports/Mobile_TestAnalytics.xlsx
          appium_framework/reports/allure-report/
          appium_framework/reports/screenshots/

name: AuraFit-AI Comprehensive Security Scan

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]
  workflow_dispatch:

jobs:
  security-assessment:
    name: Vulnerabilities Testing
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Setup Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.12'

    - name: Setup Node.js (for dependency scanning)
      uses: actions/setup-node@v4
      with:
        node-version: '22'

    - name: Install Python Requirements
      run: |
        python -m pip install --upgrade pip
        pip install pandas openpyxl

    - name: Run Vulnerabilities Testing & Generate Report
      run: |
        python security_framework/security_report_generator.py

    - name: Upload Security Assessment Artifacts
      uses: actions/upload-artifact@v4
      with:
        name: vulnerabilities-report
        path: |
          security_framework/Security_Vulnerability_Report.xlsx
        retention-days: 30

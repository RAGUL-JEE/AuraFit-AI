name: Web Frontend and Backend Tests

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  test:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          
      - name: Install Root Dependencies
        run: npm install
        
      - name: Start Application (Background)
        run: npm run dev --workspace=frontend &
        env:
          PORT: 3000

      - name: Wait for Application to be ready
        run: npx wait-on http://localhost:3000
        
      - name: Run Web Frontend Selenium Tests
        run: node frontend/selenium-tests/tests/login-test.js
          
      - name: Upload Frontend Test Report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: frontend-test-report
          path: frontend/selenium-tests/tests/report.xlsx
          
      - name: Run Backend Automated Tests
        run: |
          echo "Running backend automated tests using backend/automated-test/input.json"
          # Example of passing input to backend:
          # cat backend/automated-test/input.json | npm run test --workspace=backend

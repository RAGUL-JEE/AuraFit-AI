name: performance_suite

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  run-performance-tests:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Set up Python 3.12
      uses: actions/setup-python@v5
      with:
        python-version: "3.12"
        cache: 'pip'
      
    - name: Install Python Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r performance_testing/requirements.txt

    - name: Execute Baseline Load Testing (100 Users / 1 Minute)
      id: test_execution
      run: |
        # Ensure the performance_testing module is in PYTHONPATH
        export PYTHONPATH=.
        python performance_testing/tests/run_load_tests.py
        
      continue-on-error: true

    - name: Upload Load Testing Excel Report
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: Enterprise-Security-Excel-Report
        path: performance_testing/reports/Performance_Report.xlsx
        retention-days: 14

    - name: Upload HTML Report
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: Enterprise-HTML-Report
        path: performance_testing/reports/Performance_Report.html
        retention-days: 14
        
    - name: Upload Execution Logs
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: Enterprise-Execution-Logs
        path: performance_testing/logs/execution.log
        retention-days: 14

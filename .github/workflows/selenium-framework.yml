name: Enterprise Selenium UI Tests

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  run-selenium-tests:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Java 21
        uses: actions/setup-java@v3
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven

      - name: Setup Node.js (for App Backend/Frontend)
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install App Dependencies
        run: npm ci

      - name: Build Application
        run: npm run build

      - name: Start Application Background
        run: npm run preview &
        env:
          PORT: 5173

      - name: Wait for App to be Ready
        run: npx wait-on http://localhost:5173 -t 60000

      - name: Run Maven Selenium Tests
        working-directory: ./AuraFit-Selenium
        run: mvn clean test
        continue-on-error: true

      - name: Upload Extent Reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: Selenium-Extent-Report
          path: AuraFit-Selenium/reports/ExtentReport.html
          retention-days: 7

      - name: Upload Excel Audit Report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: Selenium-Excel-Report
          path: AuraFit-Selenium/reports/ExecutionAuditReport.xlsx
          retention-days: 7

      - name: Upload Failure Screenshots
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: Selenium-Failure-Screenshots
          path: AuraFit-Selenium/screenshots/
          retention-days: 7
          
      - name: Upload Execution Logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: Selenium-Logs
          path: AuraFit-Selenium/logs/
          retention-days: 7

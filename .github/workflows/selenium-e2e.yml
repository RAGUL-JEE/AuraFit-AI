name: Python Selenium E2E Tests

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  e2e-tests:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js (for frontend)
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Install Frontend Dependencies
        run: npm ci
        
      - name: Build Frontend
        run: npm run build

      - name: Start Application (Background)
        run: npm run preview &
        env:
          PORT: 3000

      - name: Wait for Application to be ready
        run: npx wait-on http://localhost:3000

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Python Dependencies
        working-directory: ./python_e2e
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run Pytest Selenium Framework
        working-directory: ./python_e2e
        run: pytest tests/ --html=reports/index.html --self-contained-html
        env:
          HEADLESS: 'true'

      - name: Upload Test Reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: e2e-python-reports
          path: |
            python_e2e/reports/
          retention-days: 7

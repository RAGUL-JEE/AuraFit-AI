name: appium_suite

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  run-appium-tests:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Set up Python 3.12
      uses: actions/setup-python@v5
      with:
        python-version: "3.12"
        cache: 'pip'

    - name: Set up Node (For Appium Server)
      uses: actions/setup-node@v4
      with:
        node-version: '20'

    - name: Install Appium Server
      run: |
        npm install -g appium
        appium driver install uiautomator2

    - name: Start Appium Server
      run: |
        appium &
      
    - name: Install Python Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r appium_automation/requirements.txt

    - name: Execute Appium PyTest Suite (400+ Mocked Tests)
      id: test_execution
      run: |
        # Run tests with PyTest
        python -m pytest appium_automation/tests/ -v
        
      # The python hook `pytest_sessionfinish` in conftest.py will automatically 
      # generate the `Appium_Execution_Report.xlsx` file.
      continue-on-error: true

    - name: Upload Appium Excel Report
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: Appium-Excel-Report
        path: appium_automation/reports/Appium_Execution_Report.xlsx
        retention-days: 14

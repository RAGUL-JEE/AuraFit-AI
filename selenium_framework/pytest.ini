[pytest]
addopts = --html=reports/index.html --self-contained-html --reruns 1 -v
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*
markers =
    auth: authentication tests
    dashboard: dashboard tests
    workout: workout tracking tests
    ai: ai detection tests
    favorites: favorite items tests
    schedule: scheduling tests
    progress: progress tracking tests
    profile: profile tests
    nav: navigation tests
    api: backend API validation tests
    db: database validation tests
